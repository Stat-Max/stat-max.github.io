<!DOCTYPE html>
<html>
    <head>
        <title>예제3-9 표 크기 조정</title>
        <meta charset="utf-8">
    </head>
    <body>
        <table border="1" width="100%">
        <caption>AI Software</caption>
        <tr height="100px">       <th>HTML5</th>
        <th>CSS3</th>
    <th>JavaScript</th>      </tr>
    <tr height="50px">      <td>Contents</td>
    <td>Design</td>
<td>programming</td>       </tr>
<!-- colspan결과 td2개-->
<tr>        <td colspan="2">colspan</td>  <!-- HTML5 + CSS3 병합 -->
<td rowspan="2">rowspan</td>  <!-- 아래 행과 병합 -->
</tr>
<!-- rowspan의 영향을 받는 행 -->
<tr>     <td>1</td>
<td>2</td>     </tr>
    </table></body>
</html>
